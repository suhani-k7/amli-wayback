name: Daily Site Capture

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST (1:30 AM UTC) daily
  workflow_dispatch:        # lets you trigger it manually from GitHub's Actions tab

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - run: python capture.py
      - name: Commit archive
        run: |
          git config user.name "archive-bot"
          git config user.email "archive-bot@users.noreply.github.com"
          git add archive/
          git commit -m "Capture $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
